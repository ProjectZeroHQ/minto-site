header,main,footer{width:min(800px,calc(100% - 28px));margin:auto}header{padding:24px 0}.brand{color:var(--teal);font-size:26px;font-weight:900;text-decoration:none}.brand span{color:var(--peach)}
.panel{background:#fff;border:1px solid var(--line);border-radius:28px;padding:clamp(22px,5vw,46px);box-shadow:var(--shadow);margin-bottom:50px}.eyebrow{margin:0;color:var(--green);font-size:12px;font-weight:900;letter-spacing:.12em}h1{font-size:clamp(32px,7vw,52px);line-height:1.3;letter-spacing:-.045em;margin:8px 0 12px}h1 em{font-style:normal;color:var(--green)}.lead,.small{color:var(--muted)}.small{font-size:13px}

fieldset{border:0;padding:0;margin:32px 0}legend{font-size:19px;font-weight:900;margin-bottom:12px}label{display:block;margin:9px 0;padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:#fff;cursor:pointer}label:has(input:checked){border-color:var(--green);background:var(--mint)}input{margin-right:9px}
.button{display:inline-flex;width:100%;min-height:52px;align-items:center;justify-content:center;border:0;border-radius:14px;background:var(--teal);color:#fff;font:inherit;font-weight:900;text-decoration:none;cursor:pointer;padding:10px 18px;margin-top:10px}.secondary{background:#fff;color:var(--teal);border:1px solid var(--line)}.line{background:#06c755}
.result{display:none}.result.show{display:block}.type{display:inline-block;background:var(--peach);color:#fff;padding:5px 13px;border-radius:99px;font-size:12px;font-weight:900}.result h2{font-size:clamp(28px,6vw,42px);line-height:1.35;margin:14px 0}.prompt{white-space:pre-wrap;background:#f5f8f6;border:1px solid var(--line);padding:18px;border-radius:16px;font-size:14px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions .button{margin:0}.hidden{display:none!important}footer{padding-bottom:40px;color:var(--muted);font-size:13px}footer a{color:var(--teal)}

<body>
<header><a class="brand" href="/">Dear Minto<span>●</span></a></header>
<main>
<section class="panel" id="quiz">
<p class="eyebrow">FREE / NO SIGN-UP / 1 MINUTE</p>
<h1>あなたはAIで<br><em>何が楽になる？</em></h1>
<p class="lead">AIを使ったことがなくても大丈夫。6問に答えると、あなたが最初に試す場面と、そのまま使えるコピペ文が分かります。</p>
<div class="progress" aria-hidden="true"><span id="bar"></span></div>
<form id="form">
<fieldset><legend>1. いちばん時間を取られているのは？</legend>
<label><input required type="radio" name="q1" value="write">メールや文章を考える</label><label><input type="radio" name="q1" value="organize">情報や予定を整理する</label><label><input type="radio" name="q1" value="learn">調べ物や勉強をする</label><label><input type="radio" name="q1" value="idea">アイデアを考える</label>
</fieldset>
<fieldset><legend>2. 「面倒だな」と感じることは？</legend>
<label><input required type="radio" name="q2" value="write">言い方を何度も直す</label><label><input type="radio" name="q2" value="organize">メモが散らばる</label><label><input type="radio" name="q2" value="learn">難しい説明が分からない</label><label><input type="radio" name="q2" value="idea">何から始めるか迷う</label>
</fieldset>
<fieldset><legend>3. AIを使うなら最初に欲しい結果は？</legend>
<label><input required type="radio" name="q3" value="write">送れる文章の下書き</label><label><input type="radio" name="q3" value="organize">今日やることの整理</label><label><input type="radio" name="q3" value="learn">やさしい要約</label><label><input type="radio" name="q3" value="idea">選べる案を3つ</label>
</fieldset>
<fieldset><legend>4. 普段AIを使っていますか？</legend><label><input required type="radio" name="q4" value="0">まだ使ったことがない</label><label><input type="radio" name="q4" value="1">少し触ったことがある</label></fieldset>
<fieldset><legend>5. まず何分くらいなら試せそう？</legend><label><input required type="radio" name="q5" value="3">3分</label><label><input type="radio" name="q5" value="10">10分</label></fieldset>
<fieldset><legend>6. 個人情報や機密情報を入れずに試せますか？</legend><label><input required type="radio" name="q6" value="yes">はい</label><label><input type="radio" name="q6" value="no">いいえ・分からない</label></fieldset>
<button class="button" type="submit">私の最初の使い方を見る</button>
<p class="small">回答は送信・保存されません。この画面の中だけで診断します。</p>
</form>
<div id="result" class="result" tabindex="-1" aria-live="polite"></div>
</section>
</main>
<footer><a href="/">Dear Minto公式サイト</a> · <a href="/privacy.html">プライバシーポリシー</a></footer>
<script>
const data={
write:{label:'文章らくらくタイプ',title:'最初は「文章の下書き」から',desc:'ゼロから文章を考えず、相手・目的・雰囲気を伝えて下書きを作る使い方が向いています。',prompt:'次の条件で、短く分かりやすい文章の下書きを作ってください。\n\n相手：[誰に送る？]\n目的：[何を伝える？]\n雰囲気：[丁寧／やわらかい／簡潔]\n必ず人が確認してから使用します。'},
organize:{label:'整理すっきりタイプ',title:'最初は「今日やることの整理」から',desc:'散らばったメモを、順番のある小さな行動に変える使い方が向いています。',prompt:'次のメモを、今日やる順番に3〜5個へ整理してください。\n各項目を「最初の一歩」まで小さくしてください。\n\nメモ：[個人情報を除いたメモ]\n\n不明な点は推測せず「確認が必要」と書いてください。'},
learn:{label:'理解すいすいタイプ',title:'最初は「やさしい要約」から',desc:'難しい言葉をそのままにせず、自分が理解できる言葉へ変える使い方が向いています。',prompt:'次の内容を、初めて学ぶ人にも分かる言葉で説明してください。\n1. ひとことで\n2. 具体例\n3. 間違えやすい点\nの順にしてください。\n\n内容：[公開してよい文章]'},
idea:{label:'発想ひろがるタイプ',title:'最初は「選べる3案」から',desc:'正解を1つ求めず、比べて選べる案を作る使い方が向いています。',prompt:'次の目的に合う案を3つ出してください。\nそれぞれ「向いている人」「良い点」「注意点」を1行ずつ付けてください。\n\n目的：[考えたいこと]\n条件：[予算・時間など]'}
};
const form=document.getElementById('form'),result=document.getElementById('result'),bar=document.getElementById('bar');
form.addEventListener('change',()=>{const n=new FormData(form);let count=0;for(let i=1;i<=6;i++)if(n.get('q'+i))count++;bar.style.width=(count/6*100)+'%'});
form.addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(form);const unsafe=fd.get('q6')==='no';if(unsafe){result.innerHTML='<span class="type">安全を先に確認</span><h2>今回は入力内容を見直しましょう</h2><p>氏名、住所、連絡先、勤務先の秘密、パスワード、契約・決済情報は入力しないでください。公開してよい架空の内容で試せる状態になってから始めましょう。</p><button class="button secondary" onclick="location.reload()">もう一度診断する</button>';gtag('event','beginner_quiz_result',{result_type:'safety_stop'});}else{const votes=['q1','q2','q3'].map(q=>fd.get(q));const key=['write','organize','learn','idea'].sort((a,b)=>votes.filter(v=>v===b).length-votes.filter(v=>v===a).length)[0];const d=data[key];result.innerHTML='<span class="type">'+d.label+'</span><h2>'+d.title+'</h2><p>'+d.desc+'</p><h3>このままコピーして試せます</h3><div class="prompt" id="prompt">'+d.prompt+'</div><button class="button" id="copy">コピペ文をコピーする</button><div class="actions"><button class="button secondary" id="share">診断を友だちに教える</button><a class="button line" href="https://lin.ee/Onck1KXT?utm_source=beginner_quiz&utm_medium=owned&utm_campaign=demand_engine" target="_blank" rel="noopener">LINEで初心者向け情報を受け取る</a></div><p class="small">AIの回答は間違う場合があります。公開・送信・契約・決済は自動で行わず、必ず人が確認してください。</p>';document.getElementById('copy').onclick=async()=>{await navigator.clipboard.writeText(d.prompt);gtag('event','beginner_prompt_copy',{result_type:key});document.getElementById('copy').textContent='コピーしました';};document.getElementById('share').onclick=async()=>{const share={title:'あなたはAIで何が楽になる？1分診断',text:'私の結果は「'+d.label+'」でした。AIを初めて使う人向けの無料診断です。',url:location.href};if(navigator.share)await navigator.share(share);else await navigator.clipboard.writeText(share.text+' '+share.url);gtag('event','beginner_quiz_share',{result_type:key});};gtag('event','beginner_quiz_result',{result_type:key});}form.classList.add('hidden');result.classList.add('show');result.focus();bar.style.width='100%'});
</script>
